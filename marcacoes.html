<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Glow — Marcações</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; min-height: 100vh; display: flex; flex-direction: column; background-color: white; }
        @font-face { font-family: 'High Cruiser'; src: url('fonts/HighCruiser.otf.otf') format('truetype'); }

        .logotipo { width: 100%; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; background: #fff; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 1000; }
        .logo img { width: 150px; display: block; }
        .menu { display: flex; align-items: center; gap: 22px; font-weight:bold; }
        .menu a { text-decoration: none; font-size: 13px; font-weight: bold; color: #111; letter-spacing: .5px; }
        .menu a:hover { color: #888; }
        .mais-menu { position: relative; cursor: pointer; }
        .mais-links { display: none; position: absolute; top: calc(100% + 10px); right: 0; background: white; box-shadow: 0 8px 24px rgba(0,0,0,0.12); border-radius: 10px; flex-direction: column; min-width: 160px; z-index: 9999; overflow: hidden; }
        .mais-links a { padding: 11px 16px; text-decoration: none; font-size: 13px; font-weight: bold; color: #111; display: block; }
        .mais-links a:hover { background: #f5f5f5; }
        .mais-menu:hover .mais-links { display: flex; }
        .btn-login { background: #111; color: white !important; padding: 8px 18px; border-radius: 20px; font-size: 13px; font-weight: bold; text-decoration: none; display: flex; align-items: center; gap: 7px; transition: opacity 0.2s; white-space: nowrap; }
        .btn-login:hover { opacity: 0.8; }
        .menu-toggle { display: none; flex-direction: column; gap: 5px; cursor: pointer; padding: 4px; }
        .menu-toggle span { display: block; width: 24px; height: 2px; background: #111; border-radius: 2px; }
        .menu-mobile { display: none; flex-direction: column; background: #fff; border-bottom: 1px solid #eee; padding: 16px 20px; gap: 14px; position: fixed; left: 0; width: 100%; z-index: 999; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .menu-mobile a { text-decoration: none; font-size: 15px; font-weight: bold; color: #111; padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
        .menu-mobile .btn-login { justify-content: center; margin-top: 4px; }

        .Marcacoestitulo { font-family: 'High Cruiser', Arial, sans-serif; letter-spacing: 1px; font-size: 35px; display: flex; justify-content: center; align-items: center; text-align: center; padding: 40px; }
        .badge { display: inline-block; padding: 5px 14px; border-radius: 20px; font-size: 13px; font-weight: bold; }
        .badge-pendente   { background: #fff3cd; color: #856404; }
        .badge-confirmado { background: #d4edda; color: #155724; }
        .badge-cancelado  { background: #ffcaca; color: #c0392b; }
        .badge-rejeitado  { background: #f8d7da; color: #7f1d1d; }
        .aviso-pendente { background: #fff8e8; border: 1px solid #f0d080; border-radius: 10px; padding: 10px 16px; font-size: 13px; color: #7a5c00; margin-top: 8px; display: inline-block; }
        .topo-agendamento { display: flex; justify-content: space-between; align-items: flex-start; margin: 20px 40px 10px; flex-wrap: wrap; gap: 14px; }
        .cancelar-info { background: #efeaea; padding: 15px 20px; max-width: 500px; border-radius: 10px; font-size: 14px; }
        .cancelar-info a { color: #3b5ed7; text-decoration: underline; cursor: pointer; }
        .estado-wrap { text-align: right; }
        .card-agendamento { margin: 10px 40px 30px; padding: 30px; background: linear-gradient(180deg, #d9cfc0, #cbbfae); display: flex; justify-content: space-between; align-items: center; border-radius: 15px; flex-wrap: wrap; gap: 16px; }
        .info p { margin: 8px 0; color: #333; font-size: 14px; }
        .acoes { display: flex; flex-direction: column; gap: 12px; }
        .acoes button { padding: 12px 25px; border-radius: 25px; border: none; cursor: pointer; font-size: 14px; background: #e9e5e2; transition: background 0.2s; }
        .acoes button:hover { background: #d8d4d1; }
        .acoes button.btn-cancel { color: #c0392b; border: 1px solid #c0392b; background: white; }
        .acoes button.btn-cancel:hover { background: #fff0f0; }

        .sem-marcacoes { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 70px 20px; gap: 20px; }
        .sem-marcacoes .icon-vazio { font-size: 52px; opacity: 0.25; }
        .sem-marcacoes h3 { font-size: 18px; color: #555; font-weight: normal; }
        .sem-marcacoes p { font-size: 14px; color: #aaa; max-width: 300px; line-height: 1.6; }
        .btn-primeira-marcacao { display: inline-block; margin-top: 6px; background: #111; color: white; text-decoration: none; padding: 13px 32px; border-radius: 30px; font-size: 14px; font-weight: bold; letter-spacing: 0.5px; transition: opacity 0.2s; }
        .btn-primeira-marcacao:hover { opacity: 0.75; }

        .separador { margin: 0 40px; border: none; border-top: 1px solid #e0d8d0; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); justify-content: center; align-items: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .modal-box { background: white; border-radius: 30px; padding: 50px 60px; text-align: center; max-width: 480px; width: 90%; position: relative; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .modal-box h2 { font-size: 22px; margin: 0 0 35px; font-weight: normal; }
        .modal-fechar { position: absolute; top: 20px; right: 25px; font-size: 26px; cursor: pointer; color: #555; background: none; border: none; }
        .modal-botoes { display: flex; gap: 20px; justify-content: center; }
        .modal-botoes button { padding: 14px 55px; border-radius: 30px; border: none; cursor: pointer; font-size: 16px; background: #c9bfb0; color: #333; transition: background 0.2s; }
        .modal-botoes button:hover { background: #b8ae9f; }

        .footer { background: #f8f8f8; color: #555; text-align: center; padding: 20px; display: flex; justify-content: center; align-items: center; gap: 10px; flex-wrap: wrap; border-top: 1px solid #eee; margin-top: auto; }
        .footer p { font-size: 15px; color: #555; }
        .insta { display: flex; align-items: center; gap: 6px; }
        .insta span { font-size: 14px; color: #555; }
        .icon { width: 26px; }
        .footer-copy { font-size: 12px; color: #aaa; width: 100%; text-align: center; margin-top: 4px; }

        @media (max-width: 768px) {
            .menu { display: none; } .menu-toggle { display: flex; }
            .topo-agendamento { margin: 16px 16px 10px; }
            .card-agendamento { margin: 10px 16px 24px; padding: 20px; }
            .separador { margin: 0 16px; }
            .Marcacoestitulo { font-size: 26px; padding: 28px 16px; }
            .footer { flex-direction: column; padding: 24px 16px; }
            .modal-box { padding: 36px 24px; }
            .modal-botoes button { padding: 12px 30px; }
        }
    </style>
</head>
<body>

<script>
    function toggleMenu() {
        const m = document.getElementById('menuMobile');
        const navbar = document.getElementById('navbar');
        if (!m || !navbar) return;
        if (m.style.display === 'flex') { m.style.display = 'none'; }
        else { m.style.top = navbar.offsetHeight + 'px'; m.style.display = 'flex'; }
    }
    document.addEventListener('click', function(e) {
        const m = document.getElementById('menuMobile');
        const toggle = document.querySelector('.menu-toggle');
        if (m && toggle && m.style.display === 'flex' && !m.contains(e.target) && !toggle.contains(e.target)) {
            m.style.display = 'none';
        }
    });
</script>

<div class="logotipo" id="navbar">
    <div class="logo"><a href="index.html"><img src="novologo.PNG" alt="Easy Glow Logo"></a></div>
    <div class="menu">
        <a href="servicos.html">SERVIÇOS</a>
        <a href="agendar.html">AGENDAR</a>
        <div class="mais-menu">
            <span style="font-size:13px;font-weight:bold;cursor:pointer;">MAIS ▾</span>
            <div class="mais-links">
                <a href="contactos.html">CONTACTOS</a>
                <a href="marcacoes.html">MARCAÇÕES</a>
                <a href="sobre.html">SOBRE</a>
            </div>
        </div>
        <a id="btnAuth" href="login.html" class="btn-login">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="white"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
            <span id="btnAuthText">LOGIN</span>
        </a>
    </div>
    <div class="menu-toggle" onclick="toggleMenu()"><span></span><span></span><span></span></div>
</div>

<div class="menu-mobile" id="menuMobile">
    <a href="servicos.html">SERVIÇOS</a>
    <a href="agendar.html">AGENDAR</a>
    <a href="contactos.html">CONTACTOS</a>
    <a href="marcacoes.html">MARCAÇÕES</a>
    <a href="sobre.html">SOBRE</a>
    <a id="btnAuthMobile" href="login.html" class="btn-login">LOGIN</a>
</div>

<div style="padding: 12px 20px;">
    <button onclick="history.back()" style="background:none;border:none;font-size:13px;font-weight:bold;color:#111;cursor:pointer;display:flex;align-items:center;gap:6px;letter-spacing:0.5px;">← VOLTAR</button>
</div>

<div class="Marcacoestitulo">A MINHA AGENDA</div>
<div id="listaMarcacoes"></div>

<div class="modal-overlay" id="modalCancelar">
    <div class="modal-box">
        <button class="modal-fechar" onclick="fecharModal()">&#x2715;</button>
        <h2>Deseja cancelar a marcação?</h2>
        <div class="modal-botoes">
            <button onclick="confirmarCancelamento()">Sim</button>
            <button onclick="fecharModal()">Não</button>
        </div>
    </div>
</div>

<div class="footer">
    <p>easyglow@gmail.com &nbsp;|&nbsp; +351 925 215 786 &nbsp;|&nbsp; Seg a Sex 09:00–20:00</p>
    <div class="insta"><img src="iconinstagram.PNG" class="icon" alt="Instagram"><span>@easyglow._</span></div>
    <div class="footer-copy">© 2025 Easy Glow. Todos os direitos reservados.</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPA_URL  = 'https://wonkioqayeekzcuoepcb.supabase.co';
    const SUPA_ANON = 'sb_publishable_ilm7_hVtksY0LtByJ7a_JQ_1Xq4YudK';
    const supabase  = window.supabase.createClient(SUPA_URL, SUPA_ANON);

    let _userId = null;
    let cancelarId = null;

    async function init() {
        const { data: { session } } = await supabase.auth.getSession();

        if (!session) {
            localStorage.setItem('redirectAfterLogin', 'marcacoes.html');
            location.href = 'login.html';
            return;
        }

        _userId = session.user.id;

        // Navbar
        const btn  = document.getElementById('btnAuth');
        const btnT = document.getElementById('btnAuthText');
        const btnM = document.getElementById('btnAuthMobile');
        btn.href = btnM.href = 'perfil1.html';

        const { data: perfil } = await supabase.from('profiles').select('nome').eq('id', _userId).single();
        const nome = perfil?.nome
            ? perfil.nome.split(' ')[0].toUpperCase()
            : (session.user.user_metadata?.nome || 'PERFIL').split(' ')[0].toUpperCase();
        btnT.textContent = nome;
        btnM.textContent = nome;

        renderizar();
    }

    function badgeClasse(estado) {
        const map = { pendente:'pendente', confirmado:'confirmado', cancelado:'cancelado', rejeitado:'rejeitado' };
        return 'badge badge-' + (map[(estado||'').toLowerCase()] || 'pendente');
    }

    async function renderizar() {
        const lista = document.getElementById('listaMarcacoes');
        lista.innerHTML = '<p style="text-align:center;padding:40px;color:#aaa;">A carregar...</p>';

        const { data: marcacoes, error } = await supabase
            .from('marcacoes')
            .select('*')
            .eq('user_id', _userId)
            .order('data', { ascending: false });

        if (error) {
            lista.innerHTML = '<p style="text-align:center;padding:40px;color:#c0392b;">Erro ao carregar marcações.</p>';
            return;
        }

        // ── SEM MARCAÇÕES ──
        if (!marcacoes || !marcacoes.length) {
            lista.innerHTML = `
                <div class="sem-marcacoes">
                    <div class="icon-vazio">📅</div>
                    <h3>Ainda não tem marcações</h3>
                    <p>Quando fizer uma marcação, ela aparecerá aqui para que possa acompanhar o estado.</p>
                    <a href="agendar.html" class="btn-primeira-marcacao">Fazer a minha primeira marcação →</a>
                </div>`;
            return;
        }

        // ── COM MARCAÇÕES ──
        lista.innerHTML = marcacoes.map((m, i) => `
            ${i > 0 ? '<hr class="separador">' : ''}
            <div class="topo-agendamento">
                <div class="cancelar-info">
                    ${m.estado !== 'cancelado' && m.estado !== 'rejeitado' ? `
                        <p>Caso pretenda cancelar o agendamento, clique em
                        <a onclick="abrirModal('${m.id}')">cancelar</a>.<br>
                        Após o cancelamento, o agendamento não pode ser recuperado.</p>
                    ` : `<p>Este agendamento encontra-se <strong>${m.estado}</strong>.</p>`}
                </div>
                <div class="estado-wrap">
                    <span class="${badgeClasse(m.estado)}">${(m.estado||'pendente').toUpperCase()}</span>
                    ${m.estado === 'pendente' ? `<div class="aviso-pendente">⏳ A aguardar confirmação.</div>` : ''}
                    ${m.estado === 'rejeitado' ? `<div class="aviso-pendente" style="background:#fff0f0;border-color:#f5aaaa;color:#c0392b;">✖ Marcação rejeitada.</div>` : ''}
                </div>
            </div>
            <div class="card-agendamento">
                <div class="info">
                    <p>Data: <strong>${m.data}</strong> &nbsp; Hora: <strong>${m.hora}</strong></p>
                    <p>Serviço: <strong>${m.servico}</strong></p>
                    ${m.reparticao  ? `<p>Repartição: <strong>${m.reparticao}</strong></p>`  : ''}
                    ${m.divisao     ? `<p>Divisão: <strong>${m.divisao}</strong></p>`         : ''}
                    ${m.cumprimento ? `<p>Cumprimento: <strong>${m.cumprimento}</strong></p>` : ''}
                </div>
                <div class="acoes">
                    ${m.estado !== 'cancelado' && m.estado !== 'rejeitado' ? `<button class="btn-cancel" onclick="abrirModal('${m.id}')">Cancelar</button>` : ''}
                    <button onclick="location.href='agendar.html'">Nova marcação</button>
                </div>
            </div>
        `).join('');
    }

    function abrirModal(id) {
        cancelarId = id;
        document.getElementById('modalCancelar').classList.add('active');
    }

    function fecharModal() {
        document.getElementById('modalCancelar').classList.remove('active');
        cancelarId = null;
    }

    async function confirmarCancelamento() {
        fecharModal();
        const { error } = await supabase
            .from('marcacoes')
            .update({ estado: 'cancelado' })
            .eq('id', cancelarId)
            .eq('user_id', _userId);
        if (!error) renderizar();
        else alert('Erro ao cancelar. Tente novamente.');
    }

    document.getElementById('modalCancelar').addEventListener('click', function(e) {
        if (e.target === this) fecharModal();
    });

    init();
</script>
</body>
</html>
