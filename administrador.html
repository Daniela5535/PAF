<!DOCTYPE html>
<html>
<head>
    <title>Easy Glow – Admin</title>
    <style>
        body { margin:0; 
            padding:0; 
            font-family:Arial,sans-serif; 
            background:#f5f5f5; 
            min-height:100vh; 
        }

        .admin-header { 
            background:#111; 
            color:#fff; 
            padding:18px 30px; 
            display:flex; 
            justify-content:space-between; 
            align-items:center; 
        }
        .admin-header h1 { 
            margin:0; 
            font-size:20px; 
            letter-spacing:1px; 
        }
        .admin-header button { 
            background:#c0392b; 
            color:#fff; 
            border:none; 
            border-radius:20px; 
            padding:8px 18px; 
            cursor:pointer; 
            font-size:13px; 
            font-weight:bold; 
        }

        /* LOGIN */
        .login-wrap { 
            display:flex; 
            justify-content:center; 
            align-items:center; 
            min-height:80vh; 
        }
        .login-box { 
            background:#fff; 
            padding:40px; 
            border-radius:14px; 
            width:320px; 
            box-shadow:0 4px 16px rgba(0,0,0,0.1); 
            text-align:center; 
        }
        .login-box h2 { margin:0 0 20px; }
        .login-box input { 
            width:100%; 
            padding:12px; 
            border-radius:8px; 
            border:1px solid #ccc; 
            font-size:14px; 
            outline:none; 
            margin-bottom:12px; 
            box-sizing:border-box; 
        }
        .login-box button { 
            width:100%; 
            padding:12px; 
            background:#111; 
            color:#fff; 
            border:none; 
            border-radius:25px; 
            font-size:15px; 
            font-weight:bold; 
            cursor:pointer; 
        }
        .login-box .msg-erro { 
            color:#c0392b; 
            font-size:13px; 
            margin-top:8px; 
            display:none; 
        }

        /* PAINEL */
        .painel { padding:30px 40px; display:none; }

        /* ABAS */
        .tabs { display:flex; gap:0; margin-bottom:30px; border-bottom:2px solid #ddd; }
        .tab-btn { 
            padding:11px 28px; background:none; border:none; border-bottom:3px solid transparent; 
            margin-bottom:-2px; cursor:pointer; font-size:14px; font-weight:bold; color:#888; transition:0.2s; 
        }
        .tab-btn.ativo { color:#111; border-bottom-color:#111; }
        .tab-btn:hover:not(.ativo) { color:#444; }

        .secao { display:none; }
        .secao.ativa { display:block; }
        .secao h2 { font-size:22px; margin:0 0 24px; }

        /* FILTROS */
        .filtros { display:flex; gap:10px; margin-bottom:24px; flex-wrap:wrap; }
        .filtros button { 
            padding:7px 18px; border-radius:20px; border:1px solid #ccc; 
            background:#fff; cursor:pointer; font-size:13px; font-weight:bold; 
        }
        .filtros button.ativo { background:#111; color:#fff; border-color:#111; }
        .filtros button:hover:not(.ativo) { background:#f5f5f5; }

        /* CARDS MARCAÇÕES */
        .card { 
            background:#fff; border-radius:14px; padding:20px 24px; margin-bottom:16px; 
            box-shadow:0 2px 8px rgba(0,0,0,0.07); display:flex; 
            justify-content:space-between; align-items:center; flex-wrap:wrap; gap:14px; 
        }
        .card-info p { margin:5px 0; font-size:14px; color:#333; }
        .card-info p strong { color:#111; }
        .card-acoes { display:flex; gap:8px; flex-wrap:wrap; }
        .card-acoes button { 
            padding:8px 16px; border-radius:20px; border:none; 
            cursor:pointer; font-size:13px; font-weight:bold; 
        }
        .btn-confirmar { background:#d4edda; color:#155724; }
        .btn-confirmar:hover { background:#b8dfc4; }
        .btn-cancelar  { background:#ffcaca; color:#c0392b; }
        .btn-cancelar:hover  { background:#f5aaaa; }
        .btn-rejeitar  { background:#f8d7da; color:#7f1d1d; }
        .btn-rejeitar:hover  { background:#f0b8bc; }

        /* BADGE */
        .badge { display:inline-block; padding:4px 12px; border-radius:20px; font-size:12px; font-weight:bold; }
        .badge-pendente   { background:#fff3cd; color:#856404; }
        .badge-confirmado { background:#d4edda; color:#155724; }
        .badge-cancelado  { background:#ffcaca; color:#c0392b; }
        .badge-rejeitado  { background:#f8d7da; color:#7f1d1d; }

        .sem-resultados { text-align:center; color:#aaa; padding:40px; font-size:15px; }

        /* CONTADORES */
        .contador { display:flex; gap:16px; margin-bottom:24px; flex-wrap:wrap; }
        .cnt-card { 
            background:#fff; border-radius:12px; padding:14px 20px; text-align:center; 
            flex:1; min-width:100px; box-shadow:0 2px 8px rgba(0,0,0,0.07); 
        }
        .cnt-card .num { font-size:28px; font-weight:bold; }
        .cnt-card .label { font-size:12px; color:#888; margin-top:2px; }
        .cnt-pendente   .num { color:#856404; }
        .cnt-confirmado .num { color:#155724; }
        .cnt-cancelado  .num { color:#c0392b; }
        .cnt-rejeitado  .num { color:#7f1d1d; }
        .cnt-msgs .num { color: #2980b9; }

        /* ── CARDS MENSAGENS ── */
        .msg-card { 
            background:#fff; border-radius:14px; padding:18px 24px; 
            margin-bottom:14px; box-shadow:0 2px 8px rgba(0,0,0,0.07); 
        }
        .msg-topo { 
            display:flex; justify-content:space-between; align-items:center; 
            flex-wrap:wrap; gap:8px; margin-bottom:10px; 
        }
        .msg-nome  { font-weight:bold; font-size:15px; }
        .msg-email { font-size:12px; color:#999; }
        .msg-data  { font-size:12px; color:#bbb; }
        .msg-texto { 
            font-size:14px; color:#333; line-height:1.6; 
            background:#f9f9f9; padding:12px 16px; border-radius:8px; 
        }
        .badge-nova { background:#fff3cd; color:#856404; }
        .badge-lida { background:#e9ecef; color:#555; }
        .badge-respondida { background:#d4edda; color:#155724; }

        .btn-lida { 
            padding:6px 16px; border-radius:14px; border:none; 
            background:#d4edda; color:#155724; cursor:pointer; font-size:12px; font-weight:bold; 
        }
        .btn-lida:hover { background:#b8dfc4; }
        .btn-apagar-msg { 
            padding:6px 16px; border-radius:14px; border:none; 
            background:#ffcaca; color:#c0392b; cursor:pointer; font-size:12px; font-weight:bold; 
        }
        .btn-apagar-msg:hover { background:#f5aaaa; }

        /* BOTÃO RESPONDER */
        .btn-responder {
            padding:6px 16px; border-radius:14px; border:none;
            background:#dce8fb; color:#1a5fb4; cursor:pointer; font-size:12px; font-weight:bold;
        }
        .btn-responder:hover { background:#bcd4f5; }
        .btn-enviar-resposta {
            padding:7px 20px; border-radius:14px; border:none;
            background:#111; color:#fff; cursor:pointer; font-size:13px; font-weight:bold;
        }
        .btn-enviar-resposta:hover { background:#333; }
        .btn-cancelar-resposta {
            padding:7px 16px; border-radius:14px; border:1px solid #ccc;
            background:#fff; color:#555; cursor:pointer; font-size:13px; font-weight:bold;
        }
        .btn-cancelar-resposta:hover { background:#f5f5f5; }

        /* ÁREA DE RESPOSTA (admin) */
        .resposta-area {
            margin-top:14px;
            background:#f0f4ff;
            border-radius:10px;
            padding:14px 16px;
            border-left:4px solid #1a5fb4;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
        .resposta-area textarea {
            width:100%; border:1px solid #c5d5f0; border-radius:8px;
            padding:10px 12px; font-size:13px; font-family:Arial,sans-serif;
            resize:vertical; min-height:80px; outline:none; background:#fff;
            box-sizing:border-box;
        }
        .resposta-area textarea:focus { border-color:#1a5fb4; }
        .resposta-area .resposta-acoes { display:flex; gap:8px; margin-top:10px; }

        /* RESPOSTA JÁ ENVIADA (admin view) */
        .resposta-enviada {
            margin-top:12px;
            background:#eaf4ea;
            border-radius:10px;
            padding:12px 16px;
            border-left:4px solid #27ae60;
            font-size:13px;
            color:#155724;
        }
        .resposta-enviada .resposta-label {
            font-weight:bold; font-size:11px; text-transform:uppercase;
            letter-spacing:1px; color:#27ae60; margin-bottom:6px;
        }
        .resposta-enviada .resposta-texto { color:#333; line-height:1.5; }
        .resposta-enviada .resposta-data { font-size:11px; color:#999; margin-top:4px; }

        /* TABELA UTILIZADORES */
        .pesquisa-wrap { margin-bottom:16px; }
        .pesquisa-wrap input {
            padding:10px 16px; border-radius:20px; border:1px solid #ccc;
            font-size:14px; outline:none; width:280px;
        }
        .pesquisa-wrap input:focus { border-color:#111; }

        .tabela-wrap { overflow-x:auto; }
        table { 
            width:100%; border-collapse:collapse; background:#fff; 
            border-radius:14px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.07); 
        }
        thead { background:#111; color:#fff; }
        thead th { padding:14px 16px; text-align:left; font-size:13px; font-weight:bold; letter-spacing:0.5px; }
        tbody tr { border-bottom:1px solid #f0f0f0; transition:background 0.15s; }
        tbody tr:last-child { border-bottom:none; }
        tbody tr:hover { background:#fafafa; }
        tbody td { padding:13px 16px; font-size:13px; color:#333; }

        .user-avatar {
            width:32px; height:32px; border-radius:50%; background:#c4b9a8;
            display:inline-flex; align-items:center; justify-content:center;
            font-weight:bold; font-size:13px; color:#fff; margin-right:8px; vertical-align:middle;
        }
        .user-nome { vertical-align:middle; }

        .btn-ver { 
            padding:5px 14px; border-radius:14px; border:1px solid #ccc; 
            background:#fff; cursor:pointer; font-size:12px; font-weight:bold; 
        }
        .btn-ver:hover { background:#f5f5f5; }
        .btn-apagar { 
            padding:5px 14px; border-radius:14px; border:none; 
            background:#ffcaca; color:#c0392b; cursor:pointer; font-size:12px; font-weight:bold; 
        }
        .btn-apagar:hover { background:#f5aaaa; }

        .tag-online  { display:inline-block; width:8px; height:8px; border-radius:50%; background:#0a8f3c; margin-right:5px; }
        .tag-offline { display:inline-block; width:8px; height:8px; border-radius:50%; background:#ccc; margin-right:5px; }

        /* MODAL DETALHE USER */
        .modal-overlay { 
            display:none; position:fixed; top:0; left:0; width:100%; height:100%; 
            background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:1000; 
        }
        .modal-overlay.ativo { display:flex; }
        .modal-user { 
            background:#fff; border-radius:16px; padding:30px; width:420px; 
            max-width:92%; box-shadow:0 8px 30px rgba(0,0,0,0.15); 
        }
        .modal-user h3 { margin:0 0 16px; font-size:18px; }
        .modal-user p { margin:6px 0; font-size:14px; color:#333; }
        .modal-user p strong { color:#111; }
        .modal-user hr { border:none; border-top:1px solid #eee; margin:14px 0; }
        .modal-fechar { 
            float:right; background:none; border:none; font-size:22px; 
            cursor:pointer; color:#888; margin-top:-6px; 
        }
        .modal-fechar:hover { color:#111; }
    </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
    <div class="login-box">
        <h2>🔒 Área Admin</h2>
        <input type="text"     id="adminUser" placeholder="Utilizador">
        <input type="password" id="adminPass" placeholder="Palavra-passe">
        <button onclick="fazerLogin()">Entrar</button>
        <div class="msg-erro" id="loginErro">Credenciais incorretas.</div>
    </div>
</div>

<!-- PAINEL -->
<div id="painelWrap" style="display:none;">
    <div class="admin-header">
        <h1>Easy Glow — Painel Admin</h1>
        <button onclick="sairAdmin()">Sair</button>
    </div>

    <div class="painel" id="painel">

        <!-- ABAS -->
        <div class="tabs">
            <button class="tab-btn ativo" onclick="mudarAba('marcacoes', this)">Marcações</button>
            <button class="tab-btn"       onclick="mudarAba('mensagens', this)">Mensagens</button>
            <button class="tab-btn"       onclick="mudarAba('utilizadores', this)">Utilizadores</button>
        </div>

        <!-- SECÇÃO MARCAÇÕES -->
        <div class="secao ativa" id="secao-marcacoes">
            <h2>Marcações</h2>
            <div class="contador" id="contadores"></div>
            <div class="filtros">
                <button class="ativo" onclick="filtrar('todas', this)">Todas</button>
                <button onclick="filtrar('Pendente',   this)">Pendentes</button>
                <button onclick="filtrar('Confirmado', this)">Confirmadas</button>
                <button onclick="filtrar('Cancelado',  this)">Canceladas</button>
                <button onclick="filtrar('Rejeitado',  this)">Rejeitadas</button>
            </div>
            <div id="listaMarcacoes"></div>
        </div>

        <!-- SECÇÃO MENSAGENS -->
        <div class="secao" id="secao-mensagens">
            <h2>Mensagens de Contacto</h2>
            <div class="contador" id="contadoresMsgs"></div>
            <div id="listaMensagens"></div>
        </div>

        <!-- SECÇÃO UTILIZADORES -->
        <div class="secao" id="secao-utilizadores">
            <h2>Utilizadores</h2>
            <div class="contador" id="contadoresUser"></div>
            <div class="pesquisa-wrap">
                <input type="text" id="pesquisaUser" placeholder="Pesquisar por nome ou email..." oninput="renderizarUsers()">
            </div>
            <div class="tabela-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Utilizador</th>
                            <th>Email</th>
                            <th>Marcações</th>
                            <th>Estado</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaUsers"></tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<!-- MODAL DETALHE UTILIZADOR -->
<div class="modal-overlay" id="modalUser">
    <div class="modal-user">
        <button class="modal-fechar" onclick="fecharModal()">&#x2715;</button>
        <h3 id="modalUserNome">—</h3>
        <p><strong>Email:</strong> <span id="modalUserEmail">—</span></p>
        <p><strong>Telemóvel:</strong> <span id="modalUserTel">—</span></p>
        <p><strong>Sessão activa:</strong> <span id="modalUserOnline">—</span></p>
        <hr>
        <p><strong>Total de marcações:</strong> <span id="modalUserMarcacoes">—</span></p>
        <p><strong>Favoritos:</strong> <span id="modalUserFavs">—</span></p>
        <p><strong>Notificações:</strong> <span id="modalUserNotif">—</span></p>
    </div>
</div>

<script>
    const ADMIN_USER = 'admin';
    const ADMIN_PASS = 'easyglow2025';

    let filtroAtivo = 'todas';

    function fazerLogin() {
        const u = document.getElementById('adminUser').value;
        const p = document.getElementById('adminPass').value;
        if (u === ADMIN_USER && p === ADMIN_PASS) {
            document.getElementById('loginWrap').style.display  = 'none';
            document.getElementById('painelWrap').style.display = 'block';
            document.getElementById('painel').style.display     = 'block';
            renderizar();
            renderizarUsers();
        } else {
            document.getElementById('loginErro').style.display = 'block';
        }
    }

    function sairAdmin() {
        document.getElementById('loginWrap').style.display  = 'flex';
        document.getElementById('painelWrap').style.display = 'none';
        document.getElementById('adminUser').value = '';
        document.getElementById('adminPass').value = '';
    }

    // ── ABAS ──
    function mudarAba(aba, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('ativo'));
        document.querySelectorAll('.secao').forEach(s => s.classList.remove('ativa'));
        btn.classList.add('ativo');
        document.getElementById('secao-' + aba).classList.add('ativa');
        if (aba === 'utilizadores') renderizarUsers();
        if (aba === 'mensagens')    renderizarMensagens();
    }

    // ── MARCAÇÕES ──
    function getMarcacoes() { return JSON.parse(localStorage.getItem('admin_marcacoes') || '[]'); }
    function saveMarcacoes(lista) { localStorage.setItem('admin_marcacoes', JSON.stringify(lista)); }

    function mudarEstado(id, novoEstado) {
        const todas = getMarcacoes();
        const idx = todas.findIndex(x => x.id === id);
        if (idx === -1) return;
        todas[idx].estado = novoEstado;
        saveMarcacoes(todas);
        const email = todas[idx].email;
        if (email) {
            const ud = JSON.parse(localStorage.getItem(email) || '{}');
            if (ud.marcacoes) {
                const mi = ud.marcacoes.findIndex(x => x.id === id);
                if (mi !== -1) { ud.marcacoes[mi].estado = novoEstado; localStorage.setItem(email, JSON.stringify(ud)); }
            }
        }
        renderizar();
    }

    function filtrar(f, btn) {
        filtroAtivo = f;
        document.querySelectorAll('.filtros button').forEach(b => b.classList.remove('ativo'));
        btn.classList.add('ativo');
        renderizar();
    }

    function badgeClasse(estado) {
        const m = { 'Pendente':'pendente','Confirmado':'confirmado','Cancelado':'cancelado','Rejeitado':'rejeitado' };
        return 'badge badge-' + (m[estado] || 'pendente');
    }

    function renderizar() {
        const todas = getMarcacoes();
        const cnt = { Pendente:0, Confirmado:0, Cancelado:0, Rejeitado:0 };
        todas.forEach(m => { if (cnt[m.estado] !== undefined) cnt[m.estado]++; });
        document.getElementById('contadores').innerHTML = `
            <div class="cnt-card cnt-pendente">  <div class="num">${cnt.Pendente}</div>   <div class="label">Pendentes</div></div>
            <div class="cnt-card cnt-confirmado"><div class="num">${cnt.Confirmado}</div> <div class="label">Confirmadas</div></div>
            <div class="cnt-card cnt-cancelado"> <div class="num">${cnt.Cancelado}</div>  <div class="label">Canceladas</div></div>
            <div class="cnt-card cnt-rejeitado"> <div class="num">${cnt.Rejeitado}</div>  <div class="label">Rejeitadas</div></div>
        `;
        const filtradas = filtroAtivo === 'todas' ? todas : todas.filter(m => m.estado === filtroAtivo);
        const lista = document.getElementById('listaMarcacoes');
        if (!filtradas.length) { lista.innerHTML = '<div class="sem-resultados">Sem marcações para mostrar.</div>'; return; }
        lista.innerHTML = filtradas.map(m => `
            <div class="card">
                <div class="card-info">
                    <p><strong>${m.nome}</strong> &nbsp; <span class="${badgeClasse(m.estado)}">${m.estado.toUpperCase()}</span></p>
                    <p>Serviço: <strong>${m.servico}</strong></p>
                    <p>Data: <strong>${m.data}</strong> &nbsp; Hora: <strong>${m.hora}</strong></p>
                    <p style="font-size:12px;color:#999;">Email: ${m.email || '—'}</p>
                </div>
                <div class="card-acoes">
                    ${m.estado !== 'Confirmado' ? `<button class="btn-confirmar" onclick="mudarEstado(${m.id},'Confirmado')">✔ Confirmar</button>` : ''}
                    ${m.estado !== 'Cancelado'  ? `<button class="btn-cancelar"  onclick="mudarEstado(${m.id},'Cancelado')">✖ Cancelar</button>`  : ''}
                    ${m.estado !== 'Rejeitado'  ? `<button class="btn-rejeitar"  onclick="mudarEstado(${m.id},'Rejeitado')">⊘ Rejeitar</button>`  : ''}
                </div>
            </div>
        `).join('');
    }

    // ── MENSAGENS ──
    function getMensagens() { return JSON.parse(localStorage.getItem('admin_mensagens') || '[]'); }
    function saveMensagens(lista) { localStorage.setItem('admin_mensagens', JSON.stringify(lista)); }

    function renderizarMensagens() {
        const todas = getMensagens();
        const novas = todas.filter(m => !m.lida && !m.resposta).length;
        const respondidas = todas.filter(m => m.resposta).length;

        document.getElementById('contadoresMsgs').innerHTML = `
            <div class="cnt-card cnt-msgs">   <div class="num">${todas.length}</div>       <div class="label">Total</div></div>
            <div class="cnt-card cnt-pendente"><div class="num">${novas}</div>              <div class="label">Por responder</div></div>
            <div class="cnt-card cnt-confirmado"><div class="num">${respondidas}</div>      <div class="label">Respondidas</div></div>
        `;

        const lista = document.getElementById('listaMensagens');
        if (!todas.length) { lista.innerHTML = '<div class="sem-resultados">Sem mensagens de contacto.</div>'; return; }

        lista.innerHTML = todas.map(m => {
            // determinar badge
            let badgeHtml = '';
            if (m.resposta) {
                badgeHtml = `<span class="badge badge-respondida">Respondida</span>`;
            } else if (m.lida) {
                badgeHtml = `<span class="badge badge-lida">Lida</span>`;
            } else {
                badgeHtml = `<span class="badge badge-nova">Nova</span>`;
            }

            // resposta já enviada
            const respostaHtml = m.resposta ? `
                <div class="resposta-enviada">
                    <div class="resposta-label">✔ Resposta enviada</div>
                    <div class="resposta-texto">${m.resposta}</div>
                    <div class="resposta-data">Enviada em ${m.respostaData || '—'}</div>
                    <div style="margin-top:8px;">
                        <button class="btn-responder" onclick="abrirResposta(${m.id}, true)">✏ Editar resposta</button>
                    </div>
                </div>` : `
                <div id="area-resposta-${m.id}" style="display:none;" class="resposta-area">
                    <div style="font-size:12px;font-weight:bold;color:#1a5fb4;margin-bottom:8px;text-transform:uppercase;letter-spacing:1px;">✉ Responder ao cliente</div>
                    <textarea id="texto-resposta-${m.id}" placeholder="Escreva a sua resposta aqui..."></textarea>
                    <div class="resposta-acoes">
                        <button class="btn-enviar-resposta" onclick="enviarResposta(${m.id})">Enviar resposta</button>
                        <button class="btn-cancelar-resposta" onclick="fecharResposta(${m.id})">Cancelar</button>
                    </div>
                </div>`;

            return `
            <div class="msg-card" id="msg-card-${m.id}">
                <div class="msg-topo">
                    <div>
                        <span class="msg-nome">${m.nome}</span>
                        <span class="msg-email"> — ${m.email}</span>
                    </div>
                    <div style="display:flex;gap:8px;align-items:center;">
                        ${badgeHtml}
                        <span class="msg-data">${m.data} às ${m.hora}</span>
                    </div>
                </div>
                <div class="msg-texto">${m.msg}</div>
                <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;">
                    ${!m.lida ? `<button class="btn-lida" onclick="marcarLida(${m.id})">✔ Marcar como lida</button>` : ''}
                    ${!m.resposta ? `<button class="btn-responder" onclick="abrirResposta(${m.id}, false)">✉ Responder</button>` : ''}
                    <button class="btn-apagar-msg" onclick="apagarMensagem(${m.id})">✖ Apagar</button>
                </div>
                ${respostaHtml}
            </div>`;
        }).join('');
    }

    function abrirResposta(id, editar) {
        if (editar) {
            // re-renderizar em modo edição — mais simples: forçar re-render sem resposta temporariamente
            const todas = getMensagens();
            const idx = todas.findIndex(m => m.id === id);
            if (idx === -1) return;
            const respostaAnterior = todas[idx].resposta || '';
            todas[idx]._editando = true;
            saveMensagens(todas);
            renderizarMensagens();
            // preencher textarea com resposta anterior
            const ta = document.getElementById('texto-resposta-' + id);
            if (ta) ta.value = respostaAnterior;
        } else {
            const area = document.getElementById('area-resposta-' + id);
            if (area) {
                area.style.display = area.style.display === 'none' ? 'block' : 'none';
                if (area.style.display === 'block') {
                    const ta = document.getElementById('texto-resposta-' + id);
                    if (ta) ta.focus();
                }
            }
        }
    }

    function fecharResposta(id) {
        // se estava em modo edição, limpar flag e re-renderizar
        const todas = getMensagens();
        const idx = todas.findIndex(m => m.id === id);
        if (idx !== -1 && todas[idx]._editando) {
            delete todas[idx]._editando;
            saveMensagens(todas);
            renderizarMensagens();
            return;
        }
        const area = document.getElementById('area-resposta-' + id);
        if (area) area.style.display = 'none';
    }

    function enviarResposta(id) {
        const ta = document.getElementById('texto-resposta-' + id);
        if (!ta) return;
        const texto = ta.value.trim();
        if (!texto) { alert('Por favor escreva uma resposta antes de enviar.'); return; }

        const todas = getMensagens();
        const idx = todas.findIndex(m => m.id === id);
        if (idx === -1) return;

        todas[idx].resposta = texto;
        todas[idx].lida = true;
        delete todas[idx]._editando;
        todas[idx].respostaData = new Date().toLocaleDateString('pt-PT') + ' às ' + 
            new Date().toLocaleTimeString('pt-PT', { hour:'2-digit', minute:'2-digit' });
        saveMensagens(todas);

        // Guardar também no perfil do utilizador (para ver em contactos.html)
        const emailCliente = todas[idx].email;
        const msgId = todas[idx].id;
        // Procurar conta com este email
        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (key === 'ulog' || key === 'admin_marcacoes' || key === 'admin_mensagens') continue;
            try {
                const val = JSON.parse(localStorage.getItem(key));
                if (val && val.email === emailCliente && val.mensagens) {
                    const mi = val.mensagens.findIndex(m => m.id === msgId);
                    if (mi !== -1) {
                        val.mensagens[mi].resposta = texto;
                        val.mensagens[mi].respostaData = todas[idx].respostaData;
                        localStorage.setItem(key, JSON.stringify(val));
                    }
                    break;
                }
            } catch(e) {}
        }

        renderizarMensagens();
    }

    function marcarLida(id) {
        const todas = getMensagens();
        const idx = todas.findIndex(m => m.id === id);
        if (idx !== -1) { todas[idx].lida = true; saveMensagens(todas); }
        renderizarMensagens();
    }

    function apagarMensagem(id) {
        if (!confirm('Apagar esta mensagem?')) return;
        saveMensagens(getMensagens().filter(m => m.id !== id));
        renderizarMensagens();
    }

    // ── UTILIZADORES ──
    function getUtilizadores() {
        const users = [];
        const sessaoAtiva = localStorage.getItem('ulog');
        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (key === 'ulog' || key === 'admin_marcacoes' || key === 'admin_mensagens' || 
                key === 'servicoEscolhido' || key === 'redirectAfterLogin') continue;
            try {
                const val = JSON.parse(localStorage.getItem(key));
                if (val && typeof val === 'object' && val.email && val.password) {
                    users.push({
                        email:        val.email,
                        nome:         val.nome || '—',
                        tel:          val.tel  || '—',
                        marcacoes:    (val.marcacoes || []).length,
                        favoritos:    (val.favoritos || []).join(', ') || 'Nenhum',
                        notificacoes: val.notificacoes ? 'Ativas' : 'Desativas',
                        online:       val.email === sessaoAtiva
                    });
                }
            } catch(e) {}
        }
        return users;
    }

    function renderizarUsers() {
        const users    = getUtilizadores();
        const pesquisa = (document.getElementById('pesquisaUser')?.value || '').toLowerCase();
        const filtrados = pesquisa
            ? users.filter(u => u.nome.toLowerCase().includes(pesquisa) || u.email.toLowerCase().includes(pesquisa))
            : users;
        const online = users.filter(u => u.online).length;
        const total  = users.length;

        document.getElementById('contadoresUser').innerHTML = `
            <div class="cnt-card"> <div class="num">${total}</div>         <div class="label">Contas registadas</div></div>
            <div class="cnt-card cnt-confirmado"><div class="num">${online}</div> <div class="label">Com sessão ativa</div></div>
            <div class="cnt-card"><div class="num">${total - online}</div> <div class="label">Sem sessão</div></div>
        `;

        const tbody = document.getElementById('tabelaUsers');
        if (!filtrados.length) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#aaa;padding:30px">Nenhum utilizador encontrado.</td></tr>';
            return;
        }
        tbody.innerHTML = filtrados.map(u => `
            <tr>
                <td>
                    <span class="user-avatar">${u.nome !== '—' ? u.nome[0].toUpperCase() : '?'}</span>
                    <span class="user-nome">${u.nome}</span>
                </td>
                <td>${u.email}</td>
                <td>${u.marcacoes}</td>
                <td>
                    <span class="${u.online ? 'tag-online' : 'tag-offline'}"></span>
                    ${u.online ? '<strong style="color:#0a8f3c">Online</strong>' : 'Offline'}
                </td>
                <td style="display:flex;gap:6px">
                    <button class="btn-ver"    onclick="verUser('${u.email}')">Ver</button>
                    <button class="btn-apagar" onclick="apagarUser('${u.email}')">Apagar</button>
                </td>
            </tr>
        `).join('');
    }

    function verUser(email) {
        try {
            const val = JSON.parse(localStorage.getItem(email) || '{}');
            const sessaoAtiva = localStorage.getItem('ulog');
            document.getElementById('modalUserNome').innerText      = val.nome  || '—';
            document.getElementById('modalUserEmail').innerText     = val.email || '—';
            document.getElementById('modalUserTel').innerText       = val.tel   || 'Não definido';
            document.getElementById('modalUserOnline').innerText    = val.email === sessaoAtiva ? '✔ Sim' : '✖ Não';
            document.getElementById('modalUserMarcacoes').innerText = (val.marcacoes || []).length;
            document.getElementById('modalUserFavs').innerText      = (val.favoritos || []).join(', ') || 'Nenhum';
            document.getElementById('modalUserNotif').innerText     = val.notificacoes ? 'Ativas' : 'Desativadas';
            document.getElementById('modalUser').classList.add('ativo');
        } catch(e) {}
    }

    function fecharModal() { document.getElementById('modalUser').classList.remove('ativo'); }

    function apagarUser(email) {
        if (!confirm(`Apagar a conta de ${email}? Esta ação não pode ser desfeita.`)) return;
        localStorage.removeItem(email);
        if (localStorage.getItem('ulog') === email) localStorage.removeItem('ulog');
        renderizarUsers();
    }

    document.getElementById('modalUser').addEventListener('click', function(e) {
        if (e.target === this) fecharModal();
    });

    document.addEventListener('keydown', e => { if (e.key === 'Enter') fazerLogin(); });
</script>
</body>
</html>
