<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Easy Glow</title>
    <style>
        body { 
            margin:0; 
            padding:0; 
            font-family:Arial,sans-serif;
            min-height:100vh; 
            display:flex; 
            flex-direction:column; 
        }
        .logotipo { 
            width:100%; 
            padding:0px 10px; 
            display:flex; 
            align-items:center; 
            justify-content:space-between; 
            box-sizing:border-box; 
        }
        .logo img { 
            width:170px; 
        }
        .menu { 
            display:flex; 
            align-items:center; 
            gap:18px; 
            flex-wrap:nowrap; 
        }
        .menu a { 
            text-decoration:none; 
            font-size:15px; 
            font-weight:bold; 
            color:black; 
        }
        .menu a:hover { 
            color:#7a7a7a; 
        }
        .mais-menu { 
            position:relative; 
            cursor:pointer; 
        }
        .mais-links { 
            display:none; 
            position:absolute; 
            top:100%; left:50%; 
            transform:translate(-50%); 
            background:white; 
            box-shadow:0 2px 6px rgba(0,0,0,0.2); 
            border-radius:6px; 
            flex-direction:column; 
            min-width:160px; 
            z-index:999; 
        }
        .mais-links a { 
            padding:8px 12px; 
            text-decoration:none; 
            color:black; 
        }
        .mais-links a:hover { 
            background:#f2f2f2; 
        }
        .mais-menu:hover .mais-links { 
            display:flex; 
        }

        .container { 
            display:flex; 
            justify-content:center; 
            align-items:flex-start; 
            padding:50px; 
            margin-top:10px; 
            flex-wrap:wrap; 
            gap:80px; 
        }

        .agendamento { 
            background:linear-gradient(to bottom,#dcd6cf,#f9f7f3); 
            padding:40px; 
            border-radius:12px; 
            width:350px; 
            box-shadow:0 4px 10px rgba(0,0,0,0.1); 
        }
        .agendamento h2 { 
            text-align:center;
            margin-bottom:20px; 
            font-family:'Arial Black',Arial,sans-serif; 
        }
        .agendamento label { 
            display:block; 
            margin-top:15px; 
            margin-bottom:5px; 
            font-weight:bold; 
        }
        .agendamento input, .agendamento select { 
            width:100%; 
            padding:12px 10px; 
            border-radius:8px; 
            border:1px solid #ccc; 
            outline:none; 
            font-size:14px; 
            box-sizing:border-box; 
        }
        .agendamento select.preenchido { 
            border-color:#9b59b6; 
            background:#fdf6ff; 
        }
        .agendamento button { 
            width:100%; 
            margin-top:25px; 
            padding:12px; 
            background-color:#000; 
            color:#fff; 
            font-size:16px; 
            border:none; 
            border-radius:25px; 
            cursor:pointer; 
            transition:0.3s ease; 
        }
        .agendamento button:hover { 
            opacity:0.9; 
            transform:scale(1.02); 
        }
        .aviso-servico { 
            display:none; 
            margin-top:6px; 
            font-size:12px; 
            color:#7d3c98; 
            font-style:italic; 
        }

        /* caixa de preferências */
        .prefs-box { 
            display:none; 
            margin-top:14px; 
            background:#f0eaf5; 
            border:1px solid #c77dbd; 
            border-radius:8px; 
            padding:10px 14px; 
            font-size:13px; 
            color:#555; 
        }
        .prefs-box .prefs-titulo { 
            font-weight:bold; 
            color:#7d3c98; 
            margin-bottom:6px; 
        }
        .prefs-box p { 
            margin:3px 0; 
        }

        .calendario { 
            width:350px; 
            background:white; 
            padding:30px; 
            border-radius:12px; 
            box-shadow:0 4px 10px rgba(0,0,0,0.1); 
        }
        .cal-header { 
            display:flex; 
            align-items:center; 
            justify-content:space-between; 
            margin-bottom:14px; 
        }
        .cal-nav { 
            background:none; 
            border:none; 
            font-size:20px; 
            cursor:pointer; 
            color:#555; 
            padding:0 6px; 
            line-height:1; 
        }
        .cal-nav:hover { 
            color:#000; 
        }
        .cal-mes-ano { 
            font-weight:bold; 
            font-size:14px; 
            text-align:center; 
            min-width:130px; 
        }
        .calendario table { 
            width:100%; 
            border-collapse:collapse; 
            text-align:center; 
        }
        .calendario th { 
            font-weight:bold; 
            padding:8px 0; 
            color:#555; 
            font-size:13px; 
        }
        .calendario td { 
            padding:9px 0; 
            color:#555; 
            cursor:pointer; 
            border-radius:5px; 
            font-size:13px; 
        }
        .calendario td.today { 
            background-color:#e4dddd; 
            font-weight:bold; 
        }
        .calendario td.selecionado { 
            background-color:#111; 
            color:#fff; 
        }
        .calendario td.passado { 
            color:#ccc; cursor:default; 
        }
        .calendario td.vazio { 
            cursor:default; 
        }
        .calendario td:hover:not(.passado):not(.vazio):not(.selecionado) { background-color:#e0dcd5; }

        @media(max-width:900px){ .container{flex-direction:column;align-items:center;} }
    </style>
</head>
<body>

<div class="logotipo">
    <div class="logo"><a href="pagInicial.html"><img src="novologo.PNG" alt="Easy Glow Logo"></a></div>
    <div class="menu">
        <a href="perfil1.html">PERFIL</a>
        <a href="serviços.html">SERVIÇOS</a>
        <a href="agendar.html">AGENDAR</a>
        <div class="mais-menu">
            <span><b>MAIS</b></span>
            <div class="mais-links">
                <a href="contactos.html">CONTACTOS</a>
                <a href="marcacoes.html">MARCAÇÕES</a>
                <a href="sobre.html">SOBRE</a>
            </div>
        </div>
    </div>
</div>

<div class="container">
    <div class="agendamento">
        <h2>Agende o seu horário connosco!</h2>
        <form id="formAgendamento">

            <label>Nome</label>
            <input type="text" id="nome" placeholder="Seu nome completo" required>

            <label>Serviço</label>
            <select id="servico" required>
                <option value="" disabled selected>Selecione</option>
                <option>Tranças Fulani</option>
                <option>Tranças French</option>
                <option>Tranças Goddness</option>
                <option>Tranças Gyp</option>
                <option>Tranças Lemonade</option>
                <option> Tranças Cornrows</option>
                <option> Tranças Invisible locs</option>
                <option> Tranças Butterfly locs</option>
                <option>Tranças Twist</option>
                <option>Tranças Micro</option>
                <option>Tranças Knotless</option>
                <option>Tranças Box </option>
                <option>Tranças Fulani c/ cachos</option>
                <option>Tranças French c/ cachos</option>
                <option>Tranças Goddness c/ cachos</option>
                <option>Tranças Lemonade c/ cachos</option>
                <option>Tranças Cornrows c/ cachos</option>
                <option>Tranças Twist c/ cachos</option>
                <option>Tranças Micro c/ cachos</option>
                <option>Tranças Knotless c/ cachos</option>
                <option>Tranças Box c/ cachos </option> 
            </select>
            <div class="aviso-servico" id="avisoServico">✔ Serviço pré-selecionado a partir dos Serviços</div>

            <!-- preferências vindas dos serviços -->
            <div class="prefs-box" id="prefsBox">
                <div class="prefs-titulo">✔ Preferências selecionadas nos Serviços:</div>
                <p id="prefRep"></p>
                <p id="prefDiv"></p>
                <p id="prefCump"></p>
            </div>

            <label>Data</label>
            <input id="data" type="date" id="data" required readonly style="background:#f9f9f9;cursor:default;">

            <label>Horário</label>
            <select id="horario" required>
                <option value="" disabled selected>Selecione a hora</option>
                <option>09:00</option><option>09:30</option>
                <option>10:00</option><option>10:30</option>
                <option>11:00</option><option>11:30</option>
                <option>12:00</option><option>12:30</option>
                <option>13:00</option><option>13:30</option>
                <option>14:00</option><option>14:30</option>
                <option>15:00</option><option>15:30</option>
                <option>16:00</option><option>16:30</option>
                <option>17:00</option><option>17:30</option>
                <option>18:00</option><option>18:30</option>
                <option>19:00</option><option>19:30</option>
                <option>20:00</option>
            </select>

            <button type="submit">Agendar</button>
        </form>
    </div>

    <div class="calendario">
        <div class="cal-header">
            <button class="cal-nav" onclick="mudarMes(-1)">&#8249;</button>
            <div class="cal-mes-ano" id="calMesAno"></div>
            <button class="cal-nav" onclick="mudarMes(1)">&#8250;</button>
        </div>
        <table>
            <thead><tr><th>Dom</th><th>Seg</th><th>Ter</th><th>Qua</th><th>Qui</th><th>Sex</th><th>Sáb</th></tr></thead>
            <tbody id="calendarBody"></tbody>
        </table>
    </div>
</div>

<script>
    // Proteção — requer login
    if (!localStorage.getItem('ulog')) {
        localStorage.setItem('redirectAfterLogin', 'agendar.html');
        location.href = 'login.html';
    }

    const meses = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
    const hoje = new Date();
    let calMes = hoje.getMonth(), calAno = hoje.getFullYear(), dataSelecionada = null;

    function mudarMes(dir) {
        calMes += dir;
        if (calMes < 0)  { calMes = 11; calAno--; }
        if (calMes > 11) { calMes = 0;  calAno++; }
        gerarCalendario();
    }

    function gerarCalendario() {
        document.getElementById('calMesAno').innerText = meses[calMes] + ' ' + calAno;
        const corpo = document.getElementById('calendarBody');
        corpo.innerHTML = '';
        const primeiroDia = new Date(calAno, calMes, 1).getDay();
        const diasNoMes   = new Date(calAno, calMes + 1, 0).getDate();
        let dia = 1;
        for (let i = 0; i < 6; i++) {
            const linha = document.createElement('tr');
            for (let j = 0; j < 7; j++) {
                const cel = document.createElement('td');
                if ((i === 0 && j < primeiroDia) || dia > diasNoMes) {
                    cel.classList.add('vazio');
                } else {
                    const d = dia;
                    cel.textContent = d;
                    const dataCel  = new Date(calAno, calMes, d);
                    const eHoje    = d === hoje.getDate() && calMes === hoje.getMonth() && calAno === hoje.getFullYear();
                    const ePassado = dataCel < new Date(hoje.getFullYear(), hoje.getMonth(), hoje.getDate());
                    const eSel     = dataSelecionada && d === dataSelecionada.d && calMes === dataSelecionada.m && calAno === dataSelecionada.a;
                    if (ePassado)     cel.classList.add('passado');
                    else if (eHoje)   cel.classList.add('today');
                    if (eSel)         cel.classList.add('selecionado');
                    if (!ePassado) cel.addEventListener('click', function() {
                        dataSelecionada = { d, m: calMes, a: calAno };
                        document.getElementById('data').value = calAno + '-' + String(calMes+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
                        gerarCalendario();
                    });
                    dia++;
                }
                linha.appendChild(cel);
            }
            corpo.appendChild(linha);
            if (dia > diasNoMes) break;
        }
    }

    window.onload = function() {
        // pré-preencher nome se logado
        const ulog = localStorage.getItem('ulog');
        if (ulog) {
            const ud = JSON.parse(localStorage.getItem(ulog) || '{}');
            if (ud.nome) document.getElementById('nome').value = ud.nome;
        }

        // pré-selecionar serviço
        const s = localStorage.getItem('servicoEscolhido');
        if (s) {
            const sel = document.getElementById('servico');
            for (let i = 0; i < sel.options.length; i++) {
                if (sel.options[i].value === s) {
                    sel.selectedIndex = i;
                    sel.classList.add('preenchido');
                    document.getElementById('avisoServico').style.display = 'block';
                    break;
                }
            }
            localStorage.removeItem('servicoEscolhido');
        }

        // mostrar preferências de repartição, divisão e cumprimento
        const rep  = localStorage.getItem('reparticaoEscolhida');
        const div  = localStorage.getItem('divisaoEscolhida');
        const cump = localStorage.getItem('cumprimentoEscolhido');
        if (rep || div || cump) {
            document.getElementById('prefsBox').style.display = 'block';
            if (rep)  document.getElementById('prefRep').innerHTML  = '<strong>Repartição:</strong> ' + rep;
            if (div)  document.getElementById('prefDiv').innerHTML  = '<strong>Divisão:</strong> '    + div;
            if (cump) document.getElementById('prefCump').innerHTML = '<strong>Cumprimento:</strong> ' + cump;
        }

        gerarCalendario();
    };

    document.getElementById('formAgendamento').addEventListener('submit', function(e) {
        e.preventDefault();
        if (!document.getElementById('data').value) { alert('Por favor selecione uma data no calendário.'); return; }

        const nome    = document.getElementById('nome').value.trim();
        const servico = document.getElementById('servico').value;
        const data    = document.getElementById('data').value;
        const hora    = document.getElementById('horario').value;

        const ulog = localStorage.getItem('ulog');
        if (ulog) {
            const ud = JSON.parse(localStorage.getItem(ulog) || '{}');
            if (!ud.marcacoes) ud.marcacoes = [];
            const [y, m, d] = data.split('-');
            const novaMarc = {
                id:          Date.now(),
                nome,        servico,
                data:        d + '/' + m + '/' + y,
                hora,
                estado:      'Pendente',
                email:       ulog,
                reparticao:  localStorage.getItem('reparticaoEscolhida')  || '',
                divisao:     localStorage.getItem('divisaoEscolhida')     || '',
                cumprimento: localStorage.getItem('cumprimentoEscolhido') || ''
            };
            ud.marcacoes.unshift(novaMarc);
            localStorage.setItem(ulog, JSON.stringify(ud));

            // guardar na lista do admin
            const todasMarcacoes = JSON.parse(localStorage.getItem('admin_marcacoes') || '[]');
            todasMarcacoes.unshift(novaMarc);
            localStorage.setItem('admin_marcacoes', JSON.stringify(todasMarcacoes));

            // limpar preferências
            localStorage.removeItem('reparticaoEscolhida');
            localStorage.removeItem('divisaoEscolhida');
            localStorage.removeItem('cumprimentoEscolhido');
        }

        location.href = 'marcacoes.html';
    });
</script>
</body>
</html>
