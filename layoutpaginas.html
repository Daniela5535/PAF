<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Glow</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: #fff;
        }

        @font-face {
            font-family: 'High Cruiser';
            src: url('fonts/HighCruiser.otf.otf') format('truetype');
        }
        /* ── NAVBAR ── */
        .logotipo {
            width: 100%;
            padding: 10px 20px;
            height: auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fff;
            border-bottom: 1px solid #eee;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo img { 
            width: 150px;
            display: block; 
        }

        .menu {
            display: flex;
            align-items: center;
            gap: 22px;
        }

        .menu a {
            text-decoration: none;
            font-size: 13px;
            font-weight: bold;
            color: #111;
            letter-spacing: .5px;
        }

        .menu a:hover { color: #888; }

        .mais-menu { position: relative; cursor: pointer; }

        .mais-links {
            display: none;
            position: absolute;
            top: calc(100% + 10px);
            right: 0;
            background: white;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
            border-radius: 10px;
            flex-direction: column;
            min-width: 160px;
            z-index: 999;
            overflow: hidden;
        }

        .mais-links a {
            padding: 11px 16px;
            text-decoration: none;
            font-size: 13px;
            font-weight: bold;
            color: #111;
            display: block;
        }

        .mais-links a:hover { background: #f5f5f5; }
        .mais-menu:hover .mais-links { display: flex; }

        .btn-login {
            background: #111;
            color: white !important;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 7px;
            transition: opacity 0.2s;
            white-space: nowrap;
        }

        .btn-login:hover { opacity: 0.8; }


        

        /* ── FOOTER ── */
        .contactos {
            background: #f8f8f8;
            color: #555;     
            border-top: 1px solid #eee;
            text-align: center;
            padding: 28px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 30px;
            flex-wrap: wrap;
        }

            .contactos p { 
                font-size: 15px; 
                color: #555; 
            }
            .insta span  { 
                font-size: 14px; 
                color: #555; 
            }
            .icon { 
                width: 26px; 
                filter: none; 
                opacity: 1; 
            }

            .footer-copy {
                font-size: 12px;
                color: #aaa;
                width: 100%;
                text-align: center;
                margin-top: 4px;
            }

        /* ── MOBILE ── */
        @media (max-width: 768px) {
            .menu { display: none; }
            .menu-toggle { display: flex; }

            .banner { padding: 50px 20px 44px; }
            .banner h1 { font-size: 26px; }
            .banner h2 { font-size: 16px; }
            .banner p  { font-size: 14px; }

            .contactos { gap: 12px; flex-direction: column; padding: 24px 16px; }
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <div class="logotipo">
        <div class="logo">
            <a href="index.html">
                <img src="novologo.PNG" alt="Easy Glow Logo">
            </a>
        </div>

        <!-- menu desktop -->
        <div class="menu">
            <a href="servicos.html">SERVIÇOS</a>
            <a href="agendar.html">AGENDAR</a>
            <div class="mais-menu">
                <span style="font-size:13px;font-weight:bold;cursor:pointer;">MAIS ▾</span>
                <div class="mais-links">
                    <a href="contactos.html">CONTACTOS</a>
                    <a href="marcacoes.html">MARCAÇÕES</a>
                    <a href="sobre.html">SOBRE</a>
                </div>
            </div>
            <a id="btnAuth" href="login.html" class="btn-login">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="white">
                    <circle cx="12" cy="8" r="4"/>
                    <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
                </svg>
                <span id="btnAuthText">LOGIN</span>
            </a>
        </div>

        <!-- hamburger mobile -->
        <div class="menu-toggle" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </div>
    </div>

    <!-- menu mobile -->
    <div class="menu-mobile" id="menuMobile">
        <a href="serviços.html">SERVIÇOS</a>
        <a href="agendar.html">AGENDAR</a>
        <a href="contactos.html">CONTACTOS</a>
        <a href="marcacoes.html">MARCAÇÕES</a>
        <a href="sobre.html">SOBRE</a>
        <a id="btnAuthMobile" href="login.html" class="btn-login">LOGIN</a>
    </div>

    <!-- FOOTER -->
    <div class="contactos">
        <p>easyglow@gmail.com &nbsp;|&nbsp; +351 925 215 786 &nbsp;|&nbsp; Seg a Sex 09:00–20:00</p>
        <div class="insta">
            <img src="iconinstagram.PNG" class="icon" alt="Instagram">
            <span>@easyglow._</span>
        </div>
        <div class="footer-copy">© 2025 Easy Glow. Todos os direitos reservados.</div>
    </div>

</body>
